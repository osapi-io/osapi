---
# Development config for running the agent inside a Docker container.
# The agent connects to NATS on the host machine and registers with
# a "docker-dev" label for targeting: --target env:docker-dev
debug: true

# These fields are required by config validation even for agent-only mode.
# Use dummy values since the agent doesn't need them.
controller:
  client:
    security:
      bearer_token: dev-not-used
  api:
    security:
      signing_key: dev-not-used

agent:
  nats:
    host: host.docker.internal
    port: 4222
    client_name: osapi-agent-dev
    namespace: osapi
    auth:
      type: none
  consumer:
    name: jobs-agent
    max_deliver: 5
    ack_wait: 2m
    max_ack_pending: 1000
    replay_policy: instant
    back_off:
      - 30s
      - 2m
      - 5m
      - 15m
      - 30m
  queue_group: job-agents
  hostname: ""
  max_jobs: 10
  labels:
    env: docker-dev
  facts:
    interval: 60s
  conditions:
    memory_pressure_threshold: 90
    high_load_multiplier: 2.0
    disk_pressure_threshold: 90
  metrics:
    enabled: true
    port: 9091
  # Least-privilege mode for running the agent as an
  # unprivileged user with sudo for write operations.
  privilege_escalation:
    sudo: false
    capabilities: false
    preflight: true

nats:
  stream:
    name: JOBS
  kv:
    bucket: job-queue
    response_bucket: job-responses
  registry:
    bucket: agent-registry
    ttl: 30s
    storage: file
    replicas: 1
  facts:
    bucket: agent-facts
    ttl: 5m
    storage: file
    replicas: 1
  state:
    bucket: agent-state
    storage: file
    replicas: 1
  objects:
    bucket: file-objects
  file_state:
    bucket: file-state
    storage: file
    replicas: 1
