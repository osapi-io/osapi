    namespace: osapi
    auth:
      type: none
  metrics:
    enabled: true
    host: '0.0.0.0'
    port: 9090
  notifications:
    enabled: true
    notifier: 'log'
    renotify_interval: '5m'

nats:
  server:
    host: localhost
    port: 4222
    store_dir: .nats/jetstream/
    namespace: osapi
    auth:
      type: none
      # users:
      #   - username: osapi
      #     password: '<secret>'
      # nkeys:
      #   - '<public-nkey>'
    metrics:
      enabled: true
      host: '0.0.0.0'
      port: 9092

  stream:
    name: JOBS
    subjects: jobs.>
    max_age: 24h
    max_msgs: 10000
    storage: file
    replicas: 1
    discard: old

  kv:
    bucket: job-queue
    response_bucket: job-responses
    ttl: 1h
    max_bytes: 104857600
    storage: file
    replicas: 1

  dlq:
    max_age: 7d
    max_msgs: 1000
    storage: file
    replicas: 1

  audit:
    bucket: audit-log
    ttl: 720h
    max_bytes: 52428800
    storage: file
    replicas: 1

  registry:
    bucket: agent-registry
    ttl: 30s
    storage: file
    replicas: 1

  facts:
    bucket: agent-facts
    ttl: 5m
    storage: file
    replicas: 1

  state:
    bucket: agent-state
    storage: file
    replicas: 1

  objects:
    bucket: file-objects
    max_bytes: 10737418240
    storage: file
    replicas: 1

  file_state:
    bucket: file-state
    storage: file
    replicas: 1

telemetry:
  tracing:
    enabled: true
    # exporter: stdout
    # otlp_endpoint: localhost:4317

agent:
  nats:
    host: localhost
    port: 4222
    client_name: osapi-agent
    namespace: osapi
    auth:
      type: none
  consumer:
    name: jobs-agent
    max_deliver: 5
    ack_wait: 2m
    max_ack_pending: 1000
    replay_policy: instant
    back_off:
      - 30s
      - 2m
      - 5m
      - 15m
      - 30m
  queue_group: job-agents
  hostname: ""  # defaults to system hostname
  max_jobs: 10
  labels:
    group: web.dev.us-east  # hierarchical: --target group:web, group:web.dev, etc.
  facts:
    interval: 60s
  conditions:
    memory_pressure_threshold: 90
    high_load_multiplier: 2.0
    disk_pressure_threshold: 90
  process_conditions:
    # Process RSS threshold in bytes (0 = disabled).
    memory_pressure_bytes: 0
    # Process CPU threshold as percentage (0 = disabled).
    high_cpu_percent: 0
  metrics:
    enabled: true
    host: '0.0.0.0'
    port: 9091

