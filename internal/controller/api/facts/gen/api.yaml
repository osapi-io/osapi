---
openapi: 3.0.0
info:
  title: Facts API
  version: 1.0.0
tags:
  - name: facts
    x-displayName: Facts
    description: Fact key discovery for @fact. references.
paths:
  /facts/keys:
    get:
      summary: List available fact keys
      description: >
        Returns the list of fact keys that can be used in @fact. references.
        Includes built-in keys and any custom keys registered by agents.
      operationId: GetFactKeys
      tags:
        - facts
      security:
        - BearerAuth:
            - agent:read
      responses:
        '200':
          description: List of available fact keys.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FactKeysResponse'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '../../common/gen/api.yaml#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '../../common/gen/api.yaml#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '../../common/gen/api.yaml#/components/schemas/ErrorResponse'
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    FactKeysResponse:
      type: object
      required:
        - keys
      properties:
        keys:
          type: array
          description: Available fact keys for @fact. references.
          items:
            $ref: '#/components/schemas/FactKeyEntry'
    FactKeyEntry:
      type: object
      required:
        - key
      properties:
        key:
          type: string
          description: 'The fact key (e.g. "interface.primary").'
        description:
          type: string
          description: Human-readable description of the fact.
        builtin:
          type: boolean
          description: Whether this is a built-in fact key.
