---
openapi: 3.0.0
info:
  title: Agent Management API
  version: 1.0.0
tags:
  - name: agent_operations
    x-displayName: Agent
    description: Operations related to agent discovery and details.
paths:
  /api/agent:
    get:
      operationId: getAgents
      summary: List active agents
      description: Discover all active agents in the fleet.
      tags:
        - agent_operations
      security:
        - BearerAuth:
            - agent:read
      responses:
        '200':
          description: List of active agents.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListAgentsResponse'
        '401':
          description: Unauthorized - API key required
          content:
            application/json:
              schema:
                $ref: '../../common/gen/api.yaml#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '../../common/gen/api.yaml#/components/schemas/ErrorResponse'
        '500':
          description: Error discovering agents.
          content:
            application/json:
              schema:
                $ref: '../../common/gen/api.yaml#/components/schemas/ErrorResponse'
  /api/agent/{hostname}:
    get:
      summary: Get agent details
      description: Get detailed information about a specific agent by hostname.
      operationId: getAgentDetails
      tags:
        - agent_operations
      security:
        - BearerAuth:
            - agent:read
      parameters:
        - name: hostname
          in: path
          required: true
          # NOTE: x-oapi-codegen-extra-tags on path params do not generate
          # validate tags in strict-server mode. Validation is handled
          # manually in the handler.
          x-oapi-codegen-extra-tags:
            validate: required,min=1,max=255
          schema:
            type: string
            minLength: 1
            maxLength: 255
          description: The hostname of the agent to retrieve.
      responses:
        '200':
          description: Agent details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentInfo'
        '400':
          description: Invalid hostname.
          content:
            application/json:
              schema:
                $ref: '../../common/gen/api.yaml#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - API key required
          content:
            application/json:
              schema:
                $ref: '../../common/gen/api.yaml#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '../../common/gen/api.yaml#/components/schemas/ErrorResponse'
        '404':
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: '../../common/gen/api.yaml#/components/schemas/ErrorResponse'
        '500':
          description: Error retrieving agent details.
          content:
            application/json:
              schema:
                $ref: '../../common/gen/api.yaml#/components/schemas/ErrorResponse'
  /api/agent/{hostname}/drain:
    post:
      operationId: drainAgent
      summary: Drain an agent
      description: >
        Stop the agent from accepting new jobs. In-flight jobs continue
        to completion.
      tags:
        - agent_operations
      security:
        - BearerAuth:
            - agent:write
      parameters:
        - name: hostname
          in: path
          required: true
          # NOTE: x-oapi-codegen-extra-tags on path params do not generate
          # validate tags in strict-server mode. Validation is handled
          # manually in the handler.
          x-oapi-codegen-extra-tags:
            validate: required,min=1,max=255
          schema:
            type: string
            minLength: 1
            maxLength: 255
          description: The hostname of the agent to drain.
      responses:
        '200':
          description: Agent drain initiated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                required:
                  - message
        '400':
          description: Invalid hostname.
          content:
            application/json:
              schema:
                $ref: '../../common/gen/api.yaml#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - API key required
          content:
            application/json:
              schema:
                $ref: '../../common/gen/api.yaml#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '../../common/gen/api.yaml#/components/schemas/ErrorResponse'
        '404':
          description: Agent not found.
          content:
            application/json:
              schema:
                $ref: '../../common/gen/api.yaml#/components/schemas/ErrorResponse'
        '409':
          description: Agent already in requested state.
          content:
            application/json:
              schema:
                $ref: '../../common/gen/api.yaml#/components/schemas/ErrorResponse'
  /api/agent/{hostname}/undrain:
    post:
      operationId: undrainAgent
      summary: Undrain an agent
      description: Resume accepting jobs on a drained agent.
      tags:
        - agent_operations
      security:
        - BearerAuth:
            - agent:write
      parameters:
        - name: hostname
          in: path
          required: true
          # NOTE: x-oapi-codegen-extra-tags on path params do not generate
          # validate tags in strict-server mode. Validation is handled
          # manually in the handler.
          x-oapi-codegen-extra-tags:
            validate: required,min=1,max=255
          schema:
            type: string
            minLength: 1
            maxLength: 255
          description: The hostname of the agent to undrain.
      responses:
        '200':
          description: Agent undrain initiated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                required:
                  - message
        '400':
          description: Invalid hostname.
          content:
            application/json:
              schema:
                $ref: '../../common/gen/api.yaml#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - API key required
          content:
            application/json:
              schema:
                $ref: '../../common/gen/api.yaml#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '../../common/gen/api.yaml#/components/schemas/ErrorResponse'
        '404':
          description: Agent not found.
          content:
            application/json:
              schema:
                $ref: '../../common/gen/api.yaml#/components/schemas/ErrorResponse'
        '409':
          description: Agent not in draining or cordoned state.
          content:
            application/json:
              schema:
                $ref: '../../common/gen/api.yaml#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ErrorResponse:
      $ref: '../../common/gen/api.yaml#/components/schemas/ErrorResponse'

    ListAgentsResponse:
      type: object
      properties:
        agents:
          type: array
          items:
            $ref: '#/components/schemas/AgentInfo'
        total:
          type: integer
          description: Total number of active agents.
      required:
        - agents
        - total

    AgentInfo:
      type: object
      properties:
        machine_id:
          type: string
          description: The permanent machine identifier.
        hostname:
          type: string
          description: The hostname of the agent.
        status:
          type: string
          enum: [Ready, NotReady]
          description: The current status of the agent.
        labels:
          type: object
          additionalProperties:
            type: string
          description: Key-value labels configured on the agent.
        registered_at:
          type: string
          format: date-time
          description: When the agent last refreshed its heartbeat.
        started_at:
          type: string
          format: date-time
          description: When the agent process started.
        os_info:
          $ref: '#/components/schemas/OSInfoResponse'
        uptime:
          type: string
          description: The system uptime.
        load_average:
          $ref: '#/components/schemas/LoadAverageResponse'
        memory:
          $ref: '#/components/schemas/MemoryResponse'
        architecture:
          type: string
          description: CPU architecture.
          example: "amd64"
        kernel_version:
          type: string
          description: OS kernel version.
          example: "5.15.0-91-generic"
        cpu_count:
          type: integer
          description: Number of logical CPUs.
          example: 4
        fqdn:
          type: string
          description: Fully qualified domain name.
          example: "web-01.example.com"
        service_mgr:
          type: string
          description: Init system.
          example: "systemd"
        package_mgr:
          type: string
          description: Package manager.
          example: "apt"
        interfaces:
          type: array
          items:
            $ref: '#/components/schemas/NetworkInterfaceResponse'
        primary_interface:
          type: string
          description: Name of the interface used for the default route.
          example: "eth0"
        routes:
          type: array
          items:
            $ref: '#/components/schemas/RouteResponse'
          description: Network routing table entries.
        facts:
          type: object
          additionalProperties: true
          description: Extended facts from additional providers.
        state:
          type: string
          enum: [Ready, Draining, Cordoned]
          description: Agent scheduling state.
        conditions:
          type: array
          items:
            $ref: '#/components/schemas/NodeCondition'
          description: Evaluated node conditions.
        timeline:
          type: array
          items:
            $ref: '#/components/schemas/TimelineEvent'
          description: Agent state transition history.
      required:
        - hostname
        - status

    LoadAverageResponse:
      type: object
      description: The system load averages for 1, 5, and 15 minutes.
      properties:
        1min:
          type: number
          description: Load average for the last 1 minute.
          example: 0.32
        5min:
          type: number
          description: Load average for the last 5 minutes.
          example: 0.28
        15min:
          type: number
          description: Load average for the last 15 minutes.
          example: 0.25
      required:
        - 1min
        - 5min
        - 15min

    MemoryResponse:
      type: object
      description: Memory usage information.
      properties:
        total:
          type: integer
          description: Total memory in bytes.
          example: 8388608
        free:
          type: integer
          description: Free memory in bytes.
          example: 2097152
        used:
          type: integer
          description: Used memory in bytes.
          example: 4194304
      required:
        - total
        - free
        - used

    OSInfoResponse:
      type: object
      description: Operating system information.
      properties:
        distribution:
          type: string
          description: The name of the Linux distribution.
          example: "Ubuntu"
        version:
          type: string
          description: The version of the Linux distribution.
          example: "20.04"
      required:
        - distribution
        - version

    NetworkInterfaceResponse:
      type: object
      properties:
        name:
          type: string
          example: "eth0"
        ipv4:
          type: string
          example: "192.168.1.10"
        ipv6:
          type: string
          example: "fe80::1"
        mac:
          type: string
          example: "00:11:22:33:44:55"
        family:
          type: string
          description: IP address family.
          example: "dual"
          enum:
            - inet
            - inet6
            - dual
      required:
        - name

    NodeCondition:
      type: object
      properties:
        type:
          type: string
          enum: [MemoryPressure, HighLoad, DiskPressure]
        status:
          type: boolean
        reason:
          type: string
        last_transition_time:
          type: string
          format: date-time
      required:
        - type
        - status
        - last_transition_time

    RouteResponse:
      type: object
      description: A network routing table entry.
      properties:
        destination:
          type: string
          description: Destination network address.
          example: "0.0.0.0"
        gateway:
          type: string
          description: Gateway address.
          example: "192.168.1.1"
        interface:
          type: string
          description: Network interface name.
          example: "eth0"
        mask:
          type: string
          description: Network mask in CIDR notation.
          example: "/0"
        metric:
          type: integer
          description: Route metric.
          example: 100
        flags:
          type: string
          description: Route flags.
          example: "0003"
      required:
        - destination
        - gateway
        - interface

    TimelineEvent:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        event:
          type: string
        hostname:
          type: string
        message:
          type: string
        error:
          type: string
      required:
        - timestamp
        - event
