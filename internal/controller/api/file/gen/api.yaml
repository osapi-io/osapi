---
openapi: 3.0.0
info:
  title: File Management API
  version: 1.0.0
tags:
  - name: file_operations
    x-displayName: File
    description: Object Store file management operations.

paths:
  /file:
    post:
      summary: Upload a file
      description: Upload a file to the Object Store.
      tags:
        - file_operations
      operationId: PostFile
      security:
        - BearerAuth:
            - file:write
      parameters:
        - name: force
          in: query
          required: false
          x-oapi-codegen-extra-tags:
            validate: omitempty
          description: >
            When true, bypass the digest check and always write the
            file. Returns changed=true regardless of whether the
            content differs from the existing object.
          schema:
            type: boolean
            default: false
      requestBody:
        description: The file to upload.
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: The name of the file in the Object Store.
                  example: "nginx.conf"
                content_type:
                  type: string
                  description: >
                    How the file should be treated during deploy. "raw"
                    writes bytes as-is; "template" renders with Go
                    text/template and agent facts.
                  default: raw
                  enum:
                    - raw
                    - template
                file:
                  type: string
                  format: binary
                  description: The file content.
              required:
                - name
                - file
      responses:
        '201':
          description: File uploaded successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileUploadResponse'
        '400':
          description: Invalid request payload.
          content:
            application/json:
              schema:
                $ref: '../../common/gen/api.yaml#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - API key required
          content:
            application/json:
              schema:
                $ref: '../../common/gen/api.yaml#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '../../common/gen/api.yaml#/components/schemas/ErrorResponse'
        '409':
          description: >
            File already exists with different content. Use
            ?force=true to overwrite.
          content:
            application/json:
              schema:
                $ref: '../../common/gen/api.yaml#/components/schemas/ErrorResponse'
        '500':
          description: Error uploading file.
          content:
            application/json:
              schema:
                $ref: '../../common/gen/api.yaml#/components/schemas/ErrorResponse'

    get:
      summary: List stored files
      description: List all files stored in the Object Store.
      tags:
        - file_operations
      operationId: GetFiles
      security:
        - BearerAuth:
            - file:read
      responses:
        '200':
          description: List of stored files.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileListResponse'
        '401':
          description: Unauthorized - API key required
          content:
            application/json:
              schema:
                $ref: '../../common/gen/api.yaml#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '../../common/gen/api.yaml#/components/schemas/ErrorResponse'
        '500':
          description: Error listing files.
          content:
            application/json:
              schema:
                $ref: '../../common/gen/api.yaml#/components/schemas/ErrorResponse'

  /file/{name}:
    get:
      summary: Get file metadata
      description: Get metadata for a specific file in the Object Store.
      tags:
        - file_operations
      operationId: GetFileByName
      security:
        - BearerAuth:
            - file:read
      parameters:
        - $ref: '#/components/parameters/FileName'
      responses:
        '200':
          description: File metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileInfoResponse'
        '400':
          description: Invalid file name.
          content:
            application/json:
              schema:
                $ref: '../../common/gen/api.yaml#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - API key required
          content:
            application/json:
              schema:
                $ref: '../../common/gen/api.yaml#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '../../common/gen/api.yaml#/components/schemas/ErrorResponse'
        '404':
          description: File not found.
          content:
            application/json:
              schema:
                $ref: '../../common/gen/api.yaml#/components/schemas/ErrorResponse'
        '500':
          description: Error retrieving file metadata.
          content:
            application/json:
              schema:
                $ref: '../../common/gen/api.yaml#/components/schemas/ErrorResponse'

    delete:
      summary: Delete a file
      description: Delete a file from the Object Store.
      tags:
        - file_operations
      operationId: DeleteFileByName
      security:
        - BearerAuth:
            - file:write
      parameters:
        - $ref: '#/components/parameters/FileName'
      responses:
        '200':
          description: File deleted successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileDeleteResponse'
        '400':
          description: Invalid file name.
          content:
            application/json:
              schema:
                $ref: '../../common/gen/api.yaml#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - API key required
          content:
            application/json:
              schema:
                $ref: '../../common/gen/api.yaml#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '../../common/gen/api.yaml#/components/schemas/ErrorResponse'
        '404':
          description: File not found.
          content:
            application/json:
              schema:
                $ref: '../../common/gen/api.yaml#/components/schemas/ErrorResponse'
        '500':
          description: Error deleting file.
          content:
            application/json:
              schema:
                $ref: '../../common/gen/api.yaml#/components/schemas/ErrorResponse'

# -- Reusable components -----------------------------------------------------

components:
  parameters:
    FileName:
      name: name
      in: path
      required: true
      description: >
        The name of the file in the Object Store.
      # NOTE: x-oapi-codegen-extra-tags on path params do not generate
      # validate tags in strict-server mode. Validation is handled
      # manually in the handler.
      x-oapi-codegen-extra-tags:
        validate: required,min=1,max=255
      schema:
        type: string
        minLength: 1
        maxLength: 255

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ErrorResponse:
      $ref: '../../common/gen/api.yaml#/components/schemas/ErrorResponse'

    # -- Response schemas -----------------------------------------------------

    FileInfo:
      type: object
      properties:
        name:
          type: string
          description: The name of the file.
          example: "nginx.conf"
        sha256:
          type: string
          description: SHA-256 hash of the file content.
          example: "e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855"
        size:
          type: integer
          description: File size in bytes.
          example: 1024
        content_type:
          type: string
          description: >
            How the file should be treated during deploy (raw or
            template).
          example: "raw"
      required:
        - name
        - sha256
        - size
        - content_type

    FileUploadResponse:
      type: object
      properties:
        name:
          type: string
          description: The name of the uploaded file.
          example: "nginx.conf"
        sha256:
          type: string
          description: SHA-256 hash of the file content.
          example: "e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855"
        size:
          type: integer
          description: File size in bytes.
          example: 1024
        changed:
          type: boolean
          description: >
            Whether the file content changed. False when the Object
            Store already held an object with the same SHA-256 digest.
          example: true
        content_type:
          type: string
          description: >
            How the file should be treated during deploy (raw or
            template).
          example: "raw"
      required:
        - name
        - sha256
        - size
        - changed
        - content_type

    FileListResponse:
      type: object
      properties:
        files:
          type: array
          items:
            $ref: '#/components/schemas/FileInfo'
          description: List of stored files.
        total:
          type: integer
          description: Total number of files.
          example: 5
      required:
        - files
        - total

    FileInfoResponse:
      type: object
      properties:
        name:
          type: string
          description: The name of the file.
          example: "nginx.conf"
        sha256:
          type: string
          description: SHA-256 hash of the file content.
          example: "e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855"
        size:
          type: integer
          description: File size in bytes.
          example: 1024
        content_type:
          type: string
          description: >
            How the file should be treated during deploy (raw or
            template).
          example: "raw"
      required:
        - name
        - sha256
        - size
        - content_type

    FileDeleteResponse:
      type: object
      properties:
        name:
          type: string
          description: The name of the deleted file.
          example: "nginx.conf"
        deleted:
          type: boolean
          description: Whether the file was deleted.
          example: true
      required:
        - name
        - deleted
