openapi: 3.0.0
info:
  title: Agent Management API
  version: 1.0.0
tags:
  - name: Agent_Management_API_agent_operations
    x-displayName: Agent
    description: Operations related to agent discovery and details.
  - name: Audit_Log_API_audit
    x-displayName: Audit
    description: Audit log endpoints for viewing API activity.
  - name: OSAPI_-_A_CRUD_API_for_managing_Linux_systems_info
    x-displayName: Info
    description: Operations related to the info endpoint.
  - name: Docker_Management_API_docker_operations
    x-displayName: Node/Docker
    description: Docker lifecycle operations on a target node.
  - name: Docker_Management_API_docker_exec
    x-displayName: Node/Docker/Exec
    description: Command execution inside containers on a target node.
  - name: Docker_Management_API_docker_image
    x-displayName: Node/Docker/Image
    description: Docker image operations on a target node.
  - name: Facts_API_facts
    x-displayName: Facts
    description: Fact key discovery for @fact. references.
  - name: File_Management_API_file_operations
    x-displayName: File
    description: Object Store file management operations.
  - name: Health_Check_API_health
    x-displayName: Health
    description: Health check endpoints for liveness, readiness, and detailed status.
  - name: Job_Management_API_job_operations
    x-displayName: Job
    description: Operations related to the job queue.
  - name: Node_Management_API_node_operations
    x-displayName: Node
    description: Operations related to the node endpoint.
  - name: Node_Management_API_node_status
    x-displayName: Node/Status
    description: Operations related to node status endpoint.
  - name: Node_Management_API_network_operations
    x-displayName: Node/Network
    description: Network operations on a target node.
  - name: Node_Management_API_dns_operations
    x-displayName: Node/Network/DNS
    description: DNS configuration operations on a target node.
  - name: Node_Management_API_command_operations
    x-displayName: Node/Command
    description: Command execution on a target node.
  - name: Schedule_Management_API_cron_operations
    x-displayName: Node/Schedule/Cron
    description: Cron drop-in file management on a target node.
paths:
  /agent:
    servers: []
    get:
      summary: List active agents
      description: Discover all active agents in the fleet.
      tags:
        - Agent_Management_API_agent_operations
      security:
        - BearerAuth:
            - agent:read
      responses:
        '200':
          description: List of active agents.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListAgentsResponse'
        '401':
          description: Unauthorized - API key required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error discovering agents.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /agent/{hostname}:
    servers: []
    get:
      summary: Get agent details
      description: Get detailed information about a specific agent by hostname.
      operationId: getAgentDetails
      tags:
        - Agent_Management_API_agent_operations
      security:
        - BearerAuth:
            - agent:read
      parameters:
        - name: hostname
          in: path
          required: true
          x-oapi-codegen-extra-tags:
            validate: required,min=1,max=255
          schema:
            type: string
            minLength: 1
            maxLength: 255
          description: The hostname of the agent to retrieve.
      responses:
        '200':
          description: Agent details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentInfo'
        '400':
          description: Invalid hostname.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - API key required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error retrieving agent details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /agent/{hostname}/drain:
    servers: []
    post:
      operationId: drainAgent
      summary: Drain an agent
      description: >
        Stop the agent from accepting new jobs. In-flight jobs continue to
        completion.
      tags:
        - Agent_Management_API_agent_operations
      security:
        - BearerAuth:
            - agent:write
      parameters:
        - name: hostname
          in: path
          required: true
          x-oapi-codegen-extra-tags:
            validate: required,min=1,max=255
          schema:
            type: string
            minLength: 1
            maxLength: 255
          description: The hostname of the agent to drain.
      responses:
        '200':
          description: Agent drain initiated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                required:
                  - message
        '400':
          description: Invalid hostname.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - API key required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Agent not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Agent already in requested state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /agent/{hostname}/undrain:
    servers: []
    post:
      operationId: undrainAgent
      summary: Undrain an agent
      description: Resume accepting jobs on a drained agent.
      tags:
        - Agent_Management_API_agent_operations
      security:
        - BearerAuth:
            - agent:write
      parameters:
        - name: hostname
          in: path
          required: true
          x-oapi-codegen-extra-tags:
            validate: required,min=1,max=255
          schema:
            type: string
            minLength: 1
            maxLength: 255
          description: The hostname of the agent to undrain.
      responses:
        '200':
          description: Agent undrain initiated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                required:
                  - message
        '400':
          description: Invalid hostname.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - API key required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Agent not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Agent not in draining or cordoned state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /audit:
    servers: []
    get:
      operationId: GetAuditLogs
      summary: List audit log entries
      description: Returns a paginated list of audit log entries, newest first.
      tags:
        - Audit_Log_API_audit
      security:
        - BearerAuth:
            - audit:read
      parameters:
        - name: limit
          in: query
          required: false
          x-oapi-codegen-extra-tags:
            validate: omitempty,min=1,max=100
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
          description: Maximum number of entries to return.
        - name: offset
          in: query
          required: false
          x-oapi-codegen-extra-tags:
            validate: omitempty,min=0
          schema:
            type: integer
            default: 0
            minimum: 0
          description: Number of entries to skip.
      responses:
        '200':
          description: List of audit entries.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListAuditResponse'
        '400':
          description: Invalid request parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - API key required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /audit/export:
    servers: []
    get:
      operationId: GetAuditExport
      summary: Export all audit log entries
      description: Returns all audit log entries without pagination for export.
      tags:
        - Audit_Log_API_audit
      security:
        - BearerAuth:
            - audit:read
      responses:
        '200':
          description: All audit entries.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListAuditResponse'
        '401':
          description: Unauthorized - API key required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /audit/{id}:
    servers: []
    get:
      operationId: GetAuditLogByID
      summary: Get a single audit log entry
      description: Returns a single audit log entry by ID.
      tags:
        - Audit_Log_API_audit
      security:
        - BearerAuth:
            - audit:read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The audit entry ID.
      responses:
        '200':
          description: Audit entry found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditEntryResponse'
        '401':
          description: Unauthorized - API key required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Audit entry not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /version:
    servers:
      - url: http://127.0.0.1:8080
        description: Mock API (local).
    get:
      summary: Retrieve the software version
      description: Get the current version of the software running on the system.
      tags:
        - OSAPI_-_A_CRUD_API_for_managing_Linux_systems_info
      responses:
        '400':
          description: A common JSON error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /node/{hostname}/container/docker:
    servers: []
    post:
      summary: Create a container
      description: >
        Create a new container on the target node. Returns a job ID for tracking
        the asynchronous operation.
      tags:
        - Docker_Management_API_docker_operations
      operationId: PostNodeContainerDocker
      security:
        - BearerAuth:
            - docker:write
      parameters:
        - $ref: '#/components/parameters/Hostname'
      requestBody:
        description: Container creation parameters.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DockerCreateRequest'
      responses:
        '202':
          description: Container creation accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DockerResultCollectionResponse'
        '400':
          description: Invalid request payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - API key required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error creating container.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      summary: List containers
      description: |
        List containers on the target node, optionally filtered by state.
      tags:
        - Docker_Management_API_docker_operations
      operationId: GetNodeContainerDocker
      security:
        - BearerAuth:
            - docker:read
      parameters:
        - $ref: '#/components/parameters/Hostname'
        - name: state
          in: query
          required: false
          description: |
            Filter containers by state. Defaults to "all".
          x-oapi-codegen-extra-tags:
            validate: omitempty,oneof=running stopped all
          schema:
            type: string
            default: all
            enum:
              - running
              - stopped
              - all
        - name: limit
          in: query
          required: false
          description: |
            Maximum number of containers to return.
          x-oapi-codegen-extra-tags:
            validate: omitempty,min=1,max=100
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: List of containers.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DockerListCollectionResponse'
        '400':
          description: Invalid request parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - API key required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error listing containers.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /node/{hostname}/container/docker/{id}:
    servers: []
    get:
      summary: Inspect a container
      description: |
        Get detailed information about a specific container.
      tags:
        - Docker_Management_API_docker_operations
      operationId: GetNodeContainerDockerByID
      security:
        - BearerAuth:
            - docker:read
      parameters:
        - $ref: '#/components/parameters/Hostname'
        - $ref: '#/components/parameters/DockerId'
      responses:
        '200':
          description: Container detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DockerDetailCollectionResponse'
        '400':
          description: Invalid request parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - API key required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Container not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error inspecting container.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Remove a container
      description: >
        Remove a container from the target node. Use the force query parameter
        to remove a running container.
      tags:
        - Docker_Management_API_docker_operations
      operationId: DeleteNodeContainerDockerByID
      security:
        - BearerAuth:
            - docker:write
      parameters:
        - $ref: '#/components/parameters/Hostname'
        - $ref: '#/components/parameters/DockerId'
        - name: force
          in: query
          required: false
          description: |
            Force removal of a running container.
          x-oapi-codegen-extra-tags:
            validate: omitempty
          schema:
            type: boolean
            default: false
      responses:
        '202':
          description: Container removal accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DockerActionCollectionResponse'
        '400':
          description: Invalid request parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - API key required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Container not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error removing container.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /node/{hostname}/container/docker/{id}/start:
    servers: []
    post:
      summary: Start a container
      description: |
        Start a stopped container on the target node.
      tags:
        - Docker_Management_API_docker_operations
      operationId: PostNodeContainerDockerStart
      security:
        - BearerAuth:
            - docker:write
      parameters:
        - $ref: '#/components/parameters/Hostname'
        - $ref: '#/components/parameters/DockerId'
      responses:
        '202':
          description: Container start accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DockerActionCollectionResponse'
        '400':
          description: Invalid request parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - API key required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Container not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error starting container.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /node/{hostname}/container/docker/{id}/stop:
    servers: []
    post:
      summary: Stop a container
      description: >
        Stop a running container on the target node. Optionally specify a
        timeout before the container is killed.
      tags:
        - Docker_Management_API_docker_operations
      operationId: PostNodeContainerDockerStop
      security:
        - BearerAuth:
            - docker:write
      parameters:
        - $ref: '#/components/parameters/Hostname'
        - $ref: '#/components/parameters/DockerId'
      requestBody:
        description: Optional stop parameters.
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DockerStopRequest'
      responses:
        '202':
          description: Container stop accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DockerActionCollectionResponse'
        '400':
          description: Invalid request parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - API key required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Container not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error stopping container.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /node/{hostname}/container/docker/{id}/exec:
    servers: []
    post:
      summary: Execute a command in a container
      description: |
        Execute a command inside a running container on the target node.
      tags:
        - Docker_Management_API_docker_exec
      operationId: PostNodeContainerDockerExec
      security:
        - BearerAuth:
            - docker:execute
      parameters:
        - $ref: '#/components/parameters/Hostname'
        - $ref: '#/components/parameters/DockerId'
      requestBody:
        description: The command to execute inside the container.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DockerExecRequest'
      responses:
        '202':
          description: Container exec accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DockerExecCollectionResponse'
        '400':
          description: Invalid request payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - API key required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Container not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error executing command in container.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /node/{hostname}/container/docker/image/{image}:
    servers: []
    delete:
      summary: Remove a container image
      description: >
        Remove a container image from the target node. The image parameter
        accepts an image name or ID.
      tags:
        - Docker_Management_API_docker_image
      operationId: DeleteNodeContainerDockerImage
      security:
        - BearerAuth:
            - docker:write
      parameters:
        - $ref: '#/components/parameters/Hostname'
        - name: image
          in: path
          required: true
          description: >
            Image name or ID to remove (e.g., "nginx:latest" or
            "sha256:abc123").
          x-oapi-codegen-extra-tags:
            validate: required,min=1
          schema:
            type: string
            minLength: 1
        - name: force
          in: query
          required: false
          x-oapi-codegen-extra-tags:
            validate: omitempty
          schema:
            type: boolean
            default: false
            description: Force removal even if the image is in use.
      responses:
        '202':
          description: Image removal accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DockerActionCollectionResponse'
        '400':
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - API key required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error removing image.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /node/{hostname}/container/docker/pull:
    servers: []
    post:
      summary: Pull a container image
      description: |
        Pull a container image on the target node.
      tags:
        - Docker_Management_API_docker_image
      operationId: PostNodeContainerDockerPull
      security:
        - BearerAuth:
            - docker:write
      parameters:
        - $ref: '#/components/parameters/Hostname'
      requestBody:
        description: The image to pull.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DockerPullRequest'
      responses:
        '202':
          description: Image pull accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DockerPullCollectionResponse'
        '400':
          description: Invalid request payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - API key required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error pulling image.
          content:
            application/json:
              schema:
