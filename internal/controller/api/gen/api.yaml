openapi: 3.0.0
info:
  title: Agent Management API
  version: 1.0.0
tags:
  - name: Agent_Management_API_agent_operations
    x-displayName: Agent
    description: Operations related to agent discovery and details.
  - name: Audit_Log_API_audit
    x-displayName: Audit
    description: Audit log endpoints for viewing API activity.
  - name: OSAPI_-_A_CRUD_API_for_managing_Linux_systems_info
    x-displayName: Info
    description: Operations related to the info endpoint.
  - name: Facts_API_facts
    x-displayName: Facts
    description: Fact key discovery for @fact. references.
  - name: File_Management_API_file_operations
    x-displayName: File
    description: Object Store file management operations.
  - name: Health_Check_API_health
    x-displayName: Health
    description: Health check endpoints for liveness, readiness, and detailed status.
  - name: Job_Management_API_job_operations
    x-displayName: Job
    description: Operations related to the job queue.
  - name: Node_Management_API_node_operations
    x-displayName: Node
    description: Operations related to the node endpoint.
  - name: Node_Management_API_node_status
    x-displayName: Node/Status
    description: Operations related to node status endpoint.
  - name: Certificate_Management_API_certificate_operations
    x-displayName: Node/Certificate
    description: CA certificate management on a target node.
  - name: Command_Execution_API_command_operations
    x-displayName: Node/Command
    description: Command execution on a target node.
  - name: Docker_Management_API_docker_operations
    x-displayName: Node/Docker
    description: Docker lifecycle operations on a target node.
  - name: Docker_Management_API_docker_exec
    x-displayName: Node/Docker/Exec
    description: Command execution inside containers on a target node.
  - name: Docker_Management_API_docker_image
    x-displayName: Node/Docker/Image
    description: Docker image operations on a target node.
  - name: Node_File_Operations_API_node_file_operations
    x-displayName: Node/File
    description: File deploy, undeploy, and status operations on a target node.
  - name: Hostname_Management_API_hostname_operations
    x-displayName: Node/Hostname
    description: Hostname operations on a target node.
  - name: Log_Management_API_log_operations
    x-displayName: Node/Log
    description: Log viewing operations on a target node.
  - name: Network_Management_API_network_operations
    x-displayName: Node/Network
    description: Network operations on a target node.
  - name: Network_Management_API_dns_operations
    x-displayName: Node/Network/DNS
    description: DNS configuration operations on a target node.
  - name: NTP_Management_API_ntp_operations
    x-displayName: Node/NTP
    description: NTP server configuration management on a target node.
  - name: Package_Management_API_package_operations
    x-displayName: Node/Package
    description: Package management on a target node.
  - name: Power_Management_API_power_operations
    x-displayName: Node/Power
    description: Power management operations (reboot, shutdown) on a target node.
  - name: Process_Management_API_process_operations
    x-displayName: Node/Process
    description: Process management operations on a target node.
  - name: Schedule_Management_API_cron_operations
    x-displayName: Node/Schedule/Cron
    description: Cron drop-in file management on a target node.
  - name: Service_Management_API_service_operations
    x-displayName: Node/Service
    description: Systemd service management on a target node.
  - name: Sysctl_Management_API_sysctl_operations
    x-displayName: Node/Sysctl
    description: Kernel parameter management on a target node.
  - name: Timezone_Management_API_timezone_operations
    x-displayName: Node/Timezone
    description: System timezone management on a target node.
  - name: User_and_Group_Management_API_user_operations
    x-displayName: Node/User
    description: User account management on a target node.
  - name: User_and_Group_Management_API_group_operations
    x-displayName: Node/Group
    description: Group management on a target node.
paths:
  /agent:
    servers: []
    get:
      summary: List active agents
      description: Discover all active agents in the fleet.
      tags:
        - Agent_Management_API_agent_operations
      security:
        - BearerAuth:
            - agent:read
      responses:
        '200':
          description: List of active agents.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListAgentsResponse'
        '401':
          description: Unauthorized - API key required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error discovering agents.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /agent/{hostname}:
    servers: []
    get:
      summary: Get agent details
      description: Get detailed information about a specific agent by hostname.
      operationId: getAgentDetails
      tags:
        - Agent_Management_API_agent_operations
      security:
        - BearerAuth:
            - agent:read
      parameters:
        - name: hostname
          in: path
          required: true
          x-oapi-codegen-extra-tags:
            validate: required,min=1,max=255
          schema:
            type: string
            minLength: 1
            maxLength: 255
          description: The hostname of the agent to retrieve.
      responses:
        '200':
          description: Agent details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentInfo'
        '400':
          description: Invalid hostname.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - API key required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error retrieving agent details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /agent/{hostname}/drain:
    servers: []
    post:
      operationId: drainAgent
      summary: Drain an agent
      description: >
        Stop the agent from accepting new jobs. In-flight jobs continue to
        completion.
      tags:
        - Agent_Management_API_agent_operations
      security:
        - BearerAuth:
            - agent:write
      parameters:
        - name: hostname
          in: path
          required: true
          x-oapi-codegen-extra-tags:
            validate: required,min=1,max=255
          schema:
            type: string
            minLength: 1
            maxLength: 255
          description: The hostname of the agent to drain.
      responses:
        '200':
          description: Agent drain initiated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                required:
                  - message
        '400':
          description: Invalid hostname.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - API key required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Agent not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Agent already in requested state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /agent/{hostname}/undrain:
    servers: []
    post:
      operationId: undrainAgent
      summary: Undrain an agent
      description: Resume accepting jobs on a drained agent.
      tags:
        - Agent_Management_API_agent_operations
      security:
        - BearerAuth:
            - agent:write
      parameters:
        - name: hostname
          in: path
          required: true
          x-oapi-codegen-extra-tags:
            validate: required,min=1,max=255
          schema:
            type: string
            minLength: 1
            maxLength: 255
          description: The hostname of the agent to undrain.
      responses:
        '200':
          description: Agent undrain initiated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                required:
                  - message
        '400':
          description: Invalid hostname.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - API key required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Agent not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Agent not in draining or cordoned state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /audit:
    servers: []
    get:
      operationId: GetAuditLogs
      summary: List audit log entries
      description: Returns a paginated list of audit log entries, newest first.
      tags:
        - Audit_Log_API_audit
      security:
        - BearerAuth:
            - audit:read
      parameters:
        - name: limit
          in: query
          required: false
          x-oapi-codegen-extra-tags:
            validate: omitempty,min=1,max=100
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
          description: Maximum number of entries to return.
        - name: offset
          in: query
          required: false
          x-oapi-codegen-extra-tags:
            validate: omitempty,min=0
          schema:
            type: integer
            default: 0
            minimum: 0
          description: Number of entries to skip.
      responses:
        '200':
          description: List of audit entries.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListAuditResponse'
        '400':
          description: Invalid request parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - API key required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /audit/export:
    servers: []
    get:
      operationId: GetAuditExport
      summary: Export all audit log entries
      description: Returns all audit log entries without pagination for export.
      tags:
        - Audit_Log_API_audit
      security:
        - BearerAuth:
            - audit:read
      responses:
        '200':
          description: All audit entries.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListAuditResponse'
        '401':
          description: Unauthorized - API key required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /audit/{id}:
    servers: []
    get:
      operationId: GetAuditLogByID
      summary: Get a single audit log entry
      description: Returns a single audit log entry by ID.
      tags:
        - Audit_Log_API_audit
      security:
        - BearerAuth:
            - audit:read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The audit entry ID.
      responses:
        '200':
          description: Audit entry found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditEntryResponse'
        '401':
          description: Unauthorized - API key required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Audit entry not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /version:
    servers:
      - url: http://127.0.0.1:8080
        description: Mock API (local).
    get:
      summary: Retrieve the software version
      description: Get the current version of the software running on the system.
      tags:
        - OSAPI_-_A_CRUD_API_for_managing_Linux_systems_info
      responses:
        '400':
          description: A common JSON error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /facts/keys:
    servers: []
    get:
      summary: List available fact keys
      description: >
        Returns the list of fact keys that can be used in @fact. references.
        Includes built-in keys and any custom keys registered by agents.
      operationId: GetFactKeys
      tags:
        - Facts_API_facts
      security:
        - BearerAuth:
            - agent:read
      responses:
        '200':
          description: List of available fact keys.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FactKeysResponse'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /file:
    servers: []
    post:
      summary: Upload a file
      description: Upload a file to the Object Store.
      tags:
        - File_Management_API_file_operations
      operationId: PostFile
      security:
        - BearerAuth:
            - file:write
      parameters:
        - name: force
          in: query
          required: false
          x-oapi-codegen-extra-tags:
            validate: omitempty
          description: >
            When true, bypass the digest check and always write the file.
            Returns changed=true regardless of whether the content differs from
            the existing object.
          schema:
            type: boolean
            default: false
      requestBody:
        description: The file to upload.
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: The name of the file in the Object Store.
                  example: nginx.conf
                content_type:
                  type: string
                  description: >
                    How the file should be treated during deploy. "raw" writes
                    bytes as-is; "template" renders with Go text/template and
                    agent facts.
                  default: raw
                  enum:
                    - raw
                    - template
                file:
                  type: string
                  format: binary
                  description: The file content.
              required:
                - name
                - file
      responses:
        '201':
          description: File uploaded successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileUploadResponse'
        '400':
          description: Invalid request payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - API key required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: >
            File already exists with different content. Use ?force=true to
            overwrite.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error uploading file.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      summary: List stored files
      description: List all files stored in the Object Store.
      tags:
        - File_Management_API_file_operations
      operationId: GetFiles
      security:
        - BearerAuth:
            - file:read
      responses:
        '200':
          description: List of stored files.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileListResponse'
        '401':
          description: Unauthorized - API key required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error listing files.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /file/{name}:
    servers: []
    get:
      summary: Get file metadata
      description: Get metadata for a specific file in the Object Store.
      tags:
        - File_Management_API_file_operations
      operationId: GetFileByName
      security:
        - BearerAuth:
            - file:read
      parameters:
        - $ref: '#/components/parameters/FileName'
      responses:
        '200':
          description: File metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileInfoResponse'
        '400':
          description: Invalid file name.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - API key required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: File not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error retrieving file metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Delete a file
      description: Delete a file from the Object Store.
      tags:
        - File_Management_API_file_operations
      operationId: DeleteFileByName
      security:
        - BearerAuth:
            - file:write
      parameters:
        - $ref: '#/components/parameters/FileName'
      responses:
        '200':
          description: File deleted successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileDeleteResponse'
        '400':
          description: Invalid file name.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - API key required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: File not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error deleting file.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /health:
    servers: []
    get:
      operationId: GetHealth
      summary: Liveness probe
      description: Returns 200 if the process is alive. No checks performed.
      tags:
        - Health_Check_API_health
      responses:
        '200':
          description: Process is alive.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /health/ready:
    servers: []
    get:
      operationId: GetHealthReady
      summary: Readiness probe
      description: Returns 200 when the service is ready to accept traffic.
      tags:
        - Health_Check_API_health
      responses:
        '200':
          description: Service is ready.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyResponse'
        '503':
          description: Service is not ready.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyResponse'
  /health/status:
    servers: []
    get:
      operationId: GetHealthStatus
      summary: System status and component health
      description: >-
        Returns per-component health status with system metrics. Requires
        authentication.
      tags:
        - Health_Check_API_health
      security:
        - BearerAuth:
            - health:read
      responses:
        '200':
          description: All components healthy.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '401':
          description: Unauthorized - API key required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: One or more components unhealthy.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
  /job:
    servers: []
    get:
      summary: List jobs
      description: Retrieve jobs, optionally filtered by status.
      tags:
        - Job_Management_API_job_operations
      security:
        - BearerAuth:
            - job:read
      parameters:
        - name: status
          in: query
          required: false
          x-oapi-codegen-extra-tags:
            validate: >-
              omitempty,oneof=submitted processing completed failed
              partial_failure
          schema:
            type: string
            enum:
              - submitted
              - processing
              - completed
              - failed
              - partial_failure
          description: Filter jobs by status.
        - name: limit
          in: query
          required: false
          x-oapi-codegen-extra-tags:
            validate: omitempty,min=1,max=100
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
          description: Maximum number of jobs per page (1-100).
        - name: offset
          in: query
          required: false
          x-oapi-codegen-extra-tags:
            validate: omitempty,min=0
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Number of jobs to skip for pagination.
      responses:
        '200':
          description: A list of jobs.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListJobsResponse'
        '400':
          description: Invalid request parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - API key required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error listing jobs.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /job/{id}:
    servers: []
    get:
      summary: Get job detail
      description: Retrieve details of a specific job by its ID.
      tags:
        - Job_Management_API_job_operations
      operationId: GetJobByID
      security:
        - BearerAuth:
            - job:read
      parameters:
        - name: id
          in: path
          required: true
          description: UUID of the job to retrieve.
          schema:
            type: string
            format: uuid
            x-oapi-codegen-extra-tags:
              validate: required,uuid
      responses:
        '200':
          description: The job details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobDetailResponse'
        '400':
          description: Invalid request parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - API key required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Job not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error retrieving job.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Delete a job
      description: Delete a specific job by its ID.
      tags:
        - Job_Management_API_job_operations
