    servers: []
    post:
      summary: Upload a file
      description: Upload a file to the Object Store.
      tags:
        - File_Management_API_file_operations
      operationId: PostFile
      security:
        - BearerAuth:
            - file:write
      parameters:
        - name: force
          in: query
          required: false
          x-oapi-codegen-extra-tags:
            validate: omitempty
          description: >
            When true, bypass the digest check and always write the file.
            Returns changed=true regardless of whether the content differs from
            the existing object.
          schema:
            type: boolean
            default: false
      requestBody:
        description: The file to upload.
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: The name of the file in the Object Store.
                  example: nginx.conf
                content_type:
                  type: string
                  description: >
                    How the file should be treated during deploy. "raw" writes
                    bytes as-is; "template" renders with Go text/template and
                    agent facts.
                  default: raw
                  enum:
                    - raw
                    - template
                file:
                  type: string
                  format: binary
                  description: The file content.
              required:
                - name
                - file
      responses:
        '201':
          description: File uploaded successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileUploadResponse'
        '400':
          description: Invalid request payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - API key required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: >
            File already exists with different content. Use ?force=true to
            overwrite.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
