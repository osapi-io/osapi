        List all groups on the target node.
      tags:
        - User_and_Group_Management_API_group_operations
      operationId: GetNodeGroup
      security:
        - BearerAuth:
            - user:read
      parameters:
        - $ref: '#/components/parameters/Hostname'
      responses:
        '200':
          description: List of groups.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupCollectionResponse'
        '401':
          description: Unauthorized - API key required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error listing groups.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Create a group
      description: |
        Create a new group on the target node.
      tags:
        - User_and_Group_Management_API_group_operations
      operationId: PostNodeGroup
      security:
        - BearerAuth:
            - user:write
      parameters:
        - $ref: '#/components/parameters/Hostname'
      requestBody:
        description: Group creation parameters.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupCreateRequest'
      responses:
        '200':
          description: Group created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupMutationResponse'
        '400':
          description: Invalid request payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - API key required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error creating group.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /node/{hostname}/group/{name}:
    servers: []
    get:
      summary: Get a group
      description: |
        Get a specific group by name on the target node.
      tags:
        - User_and_Group_Management_API_group_operations
      operationId: GetNodeGroupByName
