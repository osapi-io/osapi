---
name: Docs Build

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Test build website
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Install just
        uses: extractions/setup-just@v3
      - name: Fetch justfiles
        run: just fetch
      - name: Test build website
        run: just docs::build
