---
name: Docker Publish

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Fetch justfiles
        run: just fetch

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        env:
          JUST_DOCKER_IMAGE: ghcr.io/${{ github.repository }}
          JUST_DOCKER_TAG: latest
        run: |
          just docker::build
          just docker::push
